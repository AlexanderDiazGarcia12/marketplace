<!DOCTYPE html>
<!--/*
  Checkout form (US-23). The idempotency key rides in a hidden field: on a pure input-validation
  reject the controller re-renders this form with the entered values and the SAME key, so correcting
  a typo and resubmitting stays one logical attempt. A fresh key is only ever minted by GET /checkout.
*/-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Checkout', content=~{::section})}">
<body>

<section>
    <div class="mx-auto max-w-lg">
        <div class="mb-6">
            <a href="/products" class="text-sm font-medium text-slate-500 hover:text-slate-700">&larr; Back to products</a>
            <h1 class="mt-2 text-2xl font-semibold tracking-tight text-slate-900">Checkout</h1>
            <p class="mt-1 text-sm text-slate-500">Simulated purchase. Payment tokens starting with
                <code class="rounded bg-slate-100 px-1 py-0.5 text-slate-700">approved-</code> succeed;
                <code class="rounded bg-slate-100 px-1 py-0.5 text-slate-700">insufficient-funds-</code> is declined;
                <code class="rounded bg-slate-100 px-1 py-0.5 text-slate-700">gateway-error-</code> simulates an outage.</p>
        </div>

        <div th:if="${errors != null and not errors.isEmpty()}"
             class="mb-6 rounded-md border border-red-200 bg-red-50 p-4">
            <ul class="list-disc space-y-1 pl-5 text-sm text-red-700">
                <li th:each="message : ${errors}" th:text="${message}">Error</li>
            </ul>
        </div>

        <form th:action="@{/checkout}" method="post"
              class="space-y-5 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">

            <input type="hidden" name="idempotencyKey" th:value="${idempotencyKey}"/>

            <div>
                <label for="sku" class="block text-sm font-medium text-slate-700">Product SKU</label>
                <input type="text" id="sku" name="sku" th:value="${sku}" required
                       class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900"/>
            </div>

            <div>
                <label for="quantity" class="block text-sm font-medium text-slate-700">Quantity</label>
                <input type="number" id="quantity" name="quantity" min="1" th:value="${quantity}" required
                       class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900"/>
            </div>

            <div>
                <label for="paymentToken" class="block text-sm font-medium text-slate-700">Payment token</label>
                <input type="text" id="paymentToken" name="paymentToken" th:value="${paymentToken}" required
                       class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900"/>
            </div>

            <div class="flex items-center gap-3">
                <button type="submit"
                        class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                    Place order
                </button>
                <a href="/products"
                   class="inline-flex items-center rounded-md px-4 py-2 text-sm font-semibold text-slate-600 ring-1 ring-inset ring-slate-300 hover:bg-slate-50">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</section>

</body>
</html>

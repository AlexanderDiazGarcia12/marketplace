<!DOCTYPE html>
<!--/*
  Minimal checkout form (US-22). Bare by design: it exists to drive the transactional purchase Unit
  of Work end-to-end. The polished checkout experience (idempotency key carried across resubmits,
  per-failure screens, a rich confirmation page) is US-23.
*/-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Checkout', content=~{::section})}">
<body>

<section>
    <div class="mx-auto max-w-lg">
        <div class="mb-6">
            <a href="/products" class="text-sm font-medium text-slate-500 hover:text-slate-700">&larr; Back to products</a>
            <h1 class="mt-2 text-2xl font-semibold tracking-tight text-slate-900">Checkout</h1>
            <p class="mt-1 text-sm text-slate-500">Simulated purchase. Payment tokens starting with
                <code class="rounded bg-slate-100 px-1 py-0.5 text-slate-700">approved-</code> succeed;
                <code class="rounded bg-slate-100 px-1 py-0.5 text-slate-700">insufficient-funds-</code> and
                <code class="rounded bg-slate-100 px-1 py-0.5 text-slate-700">gateway-error-</code> are declined.</p>
        </div>

        <form th:action="@{/checkout}" method="post"
              class="space-y-5 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">

            <div>
                <label for="sku" class="block text-sm font-medium text-slate-700">Product SKU</label>
                <input type="text" id="sku" name="sku" required
                       class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900"/>
            </div>

            <div>
                <label for="quantity" class="block text-sm font-medium text-slate-700">Quantity</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1" required
                       class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900"/>
            </div>

            <div>
                <label for="paymentToken" class="block text-sm font-medium text-slate-700">Payment token</label>
                <input type="text" id="paymentToken" name="paymentToken" value="approved-card" required
                       class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900"/>
            </div>

            <div>
                <label for="idempotencyKey" class="block text-sm font-medium text-slate-700">Idempotency key</label>
                <input type="text" id="idempotencyKey" name="idempotencyKey" th:value="${suggestedIdempotencyKey}" required
                       class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900"/>
            </div>

            <div class="flex items-center gap-3">
                <button type="submit"
                        class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                    Place order
                </button>
                <a href="/products"
                   class="inline-flex items-center rounded-md px-4 py-2 text-sm font-semibold text-slate-600 ring-1 ring-inset ring-slate-300 hover:bg-slate-50">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</section>

</body>
</html>

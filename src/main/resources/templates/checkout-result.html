<!DOCTYPE html>
<!--/*
  Minimal checkout outcome (US-22). One page for both a confirmed order and a rejected/failed
  attempt; differentiated per-failure screens are US-23.
*/-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Checkout result', content=~{::section})}">
<body>

<section>
    <div class="mx-auto max-w-lg">

        <div th:if="${outcome == 'CONFIRMED'}"
             class="rounded-lg border border-emerald-200 bg-emerald-50 p-6 shadow-sm">
            <h1 class="text-2xl font-semibold tracking-tight text-emerald-800">Order confirmed</h1>
            <dl class="mt-4 space-y-2 text-sm text-emerald-900">
                <div class="flex justify-between"><dt class="text-emerald-700">Order</dt>
                    <dd class="font-mono" th:text="${orderId}">id</dd></div>
                <div class="flex justify-between"><dt class="text-emerald-700">SKU</dt>
                    <dd th:text="${sku}">sku</dd></div>
                <div class="flex justify-between"><dt class="text-emerald-700">Quantity</dt>
                    <dd th:text="${quantity}">1</dd></div>
                <div class="flex justify-between"><dt class="text-emerald-700">Total</dt>
                    <dd th:text="'$' + ${total}">$0.00</dd></div>
            </dl>
        </div>

        <div th:unless="${outcome == 'CONFIRMED'}"
             class="rounded-lg border border-red-200 bg-red-50 p-6 shadow-sm">
            <h1 class="text-2xl font-semibold tracking-tight text-red-800">Purchase not completed</h1>
            <p class="mt-3 text-sm text-red-700" th:text="${message}">Something went wrong.</p>
        </div>

        <div class="mt-6">
            <a href="/checkout" class="text-sm font-medium text-indigo-600 hover:text-indigo-500">&larr; Back to checkout</a>
        </div>
    </div>
</section>

</body>
</html>

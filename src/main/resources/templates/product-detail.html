<!DOCTYPE html>
<!--/*
  Product detail page (US-10). Renders a single product resolved by GET /products/{sku} through
  GetProductUseCase. The "product" model attribute is a ProductDetailView projection, never the
  domain Product record or a JPAProductEntity — the aggregate does not cross into the view.
*/-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title=${product.name}, content=~{::section})}">
<body>

    <section>
        <nav class="mb-6 text-sm text-slate-500">
            <a href="/products" class="hover:text-slate-900">Products</a>
            <span class="mx-2 text-slate-300">/</span>
            <span class="text-slate-700" th:text="${product.name}">Product name</span>
        </nav>

        <div th:if="${updatedName}"
             class="mb-6 rounded-md border border-emerald-200 bg-emerald-50 p-4 text-sm text-emerald-800">
            <span th:text="'Saved changes to ' + ${updatedName} + '.'">Saved.</span>
        </div>

        <div class="mb-6 flex justify-end gap-3">
            <a th:href="@{/products/{sku}/edit(sku=${product.sku})}"
               class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                Edit product
            </a>
            <form th:action="@{/products/{sku}/delete(sku=${product.sku})}" method="post"
                  onsubmit="return confirm('Delete this product? It will be hidden from the catalog but kept for historical orders.');">
                <button type="submit"
                        class="inline-flex items-center rounded-md bg-white px-4 py-2 text-sm font-semibold text-red-600 shadow-sm ring-1 ring-inset ring-red-200 hover:bg-red-50">
                    Delete product
                </button>
            </form>
        </div>

        <div class="grid grid-cols-1 gap-8 lg:grid-cols-2">
            <div class="flex aspect-square items-center justify-center rounded-lg border border-slate-200 bg-slate-100 text-slate-400">
                <svg class="h-24 w-24" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor"
                     aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M2.25 15.75l5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3 4.5h18M3.75 4.5v15a.75.75 0 0 0 .75.75h15a.75.75 0 0 0 .75-.75v-15M8.25 9.75a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z"/>
                </svg>
            </div>

            <div>
                <p class="text-xs font-medium uppercase tracking-wide text-indigo-600"
                   th:text="${product.category}">Category</p>
                <h1 class="mt-2 text-3xl font-semibold tracking-tight text-slate-900"
                    th:text="${product.name}">Product name</h1>
                <p class="mt-2 text-sm text-slate-500" th:text="${product.sku}">SKU-000</p>

                <p class="mt-6 text-3xl font-semibold text-slate-900" th:text="${product.priceLabel}">$0.00</p>

                <div class="mt-4">
                    <span th:if="${product.inStock}"
                          class="inline-flex items-center rounded-full bg-emerald-50 px-3 py-1 text-sm font-medium text-emerald-700"
                          th:text="${product.stock} + ' in stock'">In stock</span>
                    <span th:unless="${product.inStock}"
                          class="inline-flex items-center rounded-full bg-red-50 px-3 py-1 text-sm font-medium text-red-600">
                        Out of stock</span>
                </div>

                <dl class="mt-8 divide-y divide-slate-100 border-t border-slate-100 text-sm">
                    <div class="flex justify-between py-3">
                        <dt class="text-slate-500">SKU</dt>
                        <dd class="font-medium text-slate-900" th:text="${product.sku}">SKU-000</dd>
                    </div>
                    <div class="flex justify-between py-3">
                        <dt class="text-slate-500">Category</dt>
                        <dd class="font-medium text-slate-900" th:text="${product.category}">Category</dd>
                    </div>
                    <div class="flex justify-between py-3">
                        <dt class="text-slate-500">Weight</dt>
                        <dd class="font-medium text-slate-900" th:text="${product.weightLabel}">0 kg</dd>
                    </div>
                </dl>

                <div th:if="${!#strings.isEmpty(product.description)}" class="mt-8">
                    <h2 class="text-sm font-semibold text-slate-900">Description</h2>
                    <p class="mt-2 text-sm leading-relaxed text-slate-600" th:text="${product.description}">
                        Product description.</p>
                </div>
            </div>
        </div>

        <div class="mt-10">
            <a href="/products"
               class="inline-flex items-center text-sm font-medium text-indigo-600 hover:text-indigo-500">
                &larr; Back to products
            </a>
        </div>
    </section>

</body>
</html>

<!DOCTYPE html>
<!--/*
  Friendly HTTP 404 page for product detail (US-10). Served (with a real 404 status set by
  ProductDetailController) both when a well-formed SKU matches no live product and when the URL
  segment is not a valid SKU at all — never a stacktrace. The "sku" model attribute is the raw
  path segment as typed, echoed back for context.
*/-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Product not found', content=~{::section})}">
<body>

    <section>
        <div class="mx-auto max-w-lg py-16 text-center">
            <p class="text-sm font-semibold uppercase tracking-wide text-indigo-600">404</p>
            <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-900">Product not found</h1>
            <p class="mt-4 text-sm text-slate-500">
                We couldn't find a product for
                <span class="font-medium text-slate-700" th:text="'“' + ${sku} + '”'">“SKU-000”</span>.
                It may have been removed, or the SKU may be incorrect.
            </p>
            <div class="mt-8">
                <a href="/products"
                   class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                    Back to products
                </a>
            </div>
        </div>
    </section>

</body>
</html>

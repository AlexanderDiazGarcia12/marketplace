<!DOCTYPE html>
<!--/*
  Friendly HTTP 404 page for the import-job status view (US-18). Served (with a real 404 status set
  by ImportJobStatusController) both when a well-formed job id matches no job and when the URL
  segment is not a valid UUID at all — never a stacktrace. The "jobId" model attribute is the raw
  path segment as typed, echoed back for context.
*/-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Import job not found', content=~{::section})}">
<body>

    <section>
        <div class="mx-auto max-w-lg py-16 text-center">
            <p class="text-sm font-semibold uppercase tracking-wide text-indigo-600">404</p>
            <h1 class="mt-3 text-3xl font-semibold tracking-tight text-slate-900">Import job not found</h1>
            <p class="mt-4 text-sm text-slate-500">
                We couldn't find an import job for
                <span class="font-medium text-slate-700" th:text="'“' + ${jobId} + '”'">“job-id”</span>.
                The job may have never existed, or the id may be incorrect.
            </p>
            <div class="mt-8">
                <a href="/products/import"
                   class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                    Go to CSV import
                </a>
            </div>
        </div>
    </section>

</body>
</html>

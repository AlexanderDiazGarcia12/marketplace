<!DOCTYPE html>
<!--/*
  CSV bulk-upload form (US-16). Minimal by design: a single file input that POSTs multipart to
  /products/import. Envelope validation failures (wrong type/header/size) come back as a single
  inline error banner; the rich job-tracking view is US-18, not here.
*/-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='Import products', content=~{::section})}">
<body>

<section>
    <div class="mx-auto max-w-2xl">
        <div class="mb-6">
            <a href="/products" class="text-sm font-medium text-slate-500 hover:text-slate-700">&larr; Back to products</a>
            <h1 class="mt-2 text-2xl font-semibold tracking-tight text-slate-900">Import products from CSV</h1>
            <p class="mt-1 text-sm text-slate-500">Upload a CSV file to queue a bulk import. The file is processed
                in the background, so this page returns as soon as the job is accepted.</p>
        </div>

        <div th:if="${error}" class="mb-6 rounded-md border border-red-200 bg-red-50 p-4">
            <p class="text-sm text-red-700" th:text="${error}">Upload error</p>
        </div>

        <form th:action="@{/products/import}" method="post" enctype="multipart/form-data"
              class="space-y-6 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">

            <div>
                <label for="file" class="block text-sm font-medium text-slate-700">CSV file</label>
                <input type="file" id="file" name="file" accept=".csv"
                       class="mt-1 block w-full rounded-md border border-slate-300 px-3 py-2 text-sm text-slate-900
                              file:mr-4 file:rounded-md file:border-0 file:bg-indigo-50 file:px-3 file:py-1.5
                              file:text-sm file:font-semibold file:text-indigo-700 hover:file:bg-indigo-100"/>
                <p class="mt-2 text-xs text-slate-500">Expected header:
                    <code class="rounded bg-slate-100 px-1 py-0.5 text-slate-700" th:text="${expectedHeader}">header</code>
                </p>
            </div>

            <div class="flex items-center gap-3">
                <button type="submit"
                        class="inline-flex items-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500">
                    Start import
                </button>
                <a href="/products"
                   class="inline-flex items-center rounded-md px-4 py-2 text-sm font-semibold text-slate-600 ring-1 ring-inset ring-slate-300 hover:bg-slate-50">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</section>

</body>
</html>

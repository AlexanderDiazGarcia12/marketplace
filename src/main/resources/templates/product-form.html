<!DOCTYPE html>
<!--/*
  Create-product form (US-09). Reuses fragments/layout :: page for header/nav/footer.

  Errors are the view projection of accumulated Vavr Validation failures (ProductFormErrors):
  every invalid field is rendered at once on a rejected submit, and a duplicate SKU coming back
  from persistence surfaces as an inline field error on the sku input — no stacktraces reach here.
*/-->
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(title='New product', content=~{::section})}">
<body>

<section>
    <div class="mx-auto max-w-2xl">
        <div class="mb-6">
            <a href="/products" class="text-sm font-medium text-slate-500 hover:text-slate-700">&larr; Back to products</a>
            <h1 class="mt-2 text-2xl font-semibold tracking-tight text-slate-900">New product</h1>
            <p class="mt-1 text-sm text-slate-500">Add a single product to the catalog. All fields except
                description are required.</p>
        </div>

        <div th:if="${errors.formErrors != null and not errors.formErrors.isEmpty()}"
             class="mb-6 rounded-md border border-red-200 bg-red-50 p-4">
            <ul class="list-disc space-y-1 pl-5 text-sm text-red-700">
                <li th:each="message : ${errors.formErrors}" th:text="${message}">Error</li>
            </ul>
        </div>

        <form th:action="@{/products}" th:object="${productForm}" method="post"
              class="space-y-6 rounded-lg border border-slate-200 bg-white p-6 shadow-sm">

            <div>
                <label for="sku" class="block text-sm font-medium text-slate-700">SKU</label>
                <input type="text" id="sku" th:field="*{sku}" placeholder="RS-001"
                       th:classappend="${errors.field('sku')} ? 'ring-red-400 focus:ring-red-500' : 'ring-slate-300 focus:ring-indigo-500'"
                       class="mt-1 block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm"/>
                <p th:if="${errors.field('sku')}" th:text="${errors.field('sku')}"
                   class="mt-1 text-sm text-red-600">SKU error</p>
            </div>

            <div>
                <label for="name" class="block text-sm font-medium text-slate-700">Name</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Running Shoes"
                       th:classappend="${errors.field('name')} ? 'ring-red-400 focus:ring-red-500' : 'ring-slate-300 focus:ring-indigo-500'"
                       class="mt-1 block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm"/>
                <p th:if="${errors.field('name')}" th:text="${errors.field('name')}"
                   class="mt-1 text-sm text-red-600">Name error</p>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-slate-700">Description
                    <span class="font-normal text-slate-400">(optional)</span></label>
                <textarea id="description" th:field="*{description}" rows="3"
                          class="mt-1 block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset ring-slate-300 focus:ring-2 focus:ring-inset focus:ring-indigo-500 sm:text-sm"></textarea>
            </div>

            <div>
                <label for="category" class="block text-sm font-medium text-slate-700">Category</label>
                <select id="category" th:field="*{category}"
                        th:classappend="${errors.field('category')} ? 'ring-red-400 focus:ring-red-500' : 'ring-slate-300 focus:ring-indigo-500'"
                        class="mt-1 block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm">
                    <option value="">Select a category</option>
                    <option th:each="label : ${categories}" th:value="${label}" th:text="${label}">Category</option>
                </select>
                <p th:if="${errors.field('category')}" th:text="${errors.field('category')}"
                   class="mt-1 text-sm text-red-600">Category error</p>
            </div>

            <div class="grid grid-cols-1 gap-6 sm:grid-cols-3">
                <div>
                    <label for="price" class="block text-sm font-medium text-slate-700">Price</label>
                    <input type="text" id="price" th:field="*{price}" placeholder="$29.99"
                           th:classappend="${errors.field('price')} ? 'ring-red-400 focus:ring-red-500' : 'ring-slate-300 focus:ring-indigo-500'"
                           class="mt-1 block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm"/>
                    <p th:if="${errors.field('price')}" th:text="${errors.field('price')}"
                       class="mt-1 text-sm text-red-600">Price error</p>
                </div>

                <div>
                    <label for="stock" class="block text-sm font-medium text-slate-700">Stock</label>
                    <input type="text" id="stock" th:field="*{stock}" placeholder="150"
                           th:classappend="${errors.field('stock')} ? 'ring-red-400 focus:ring-red-500' : 'ring-slate-300 focus:ring-indigo-500'"
                           class="mt-1 block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm"/>
                    <p th:if="${errors.field('stock')}" th:text="${errors.field('stock')}"
                       class="mt-1 text-sm text-red-600">Stock error</p>
                </div>

                <div>
                    <label for="weightKg" class="block text-sm font-medium text-slate-700">Weight (kg)</label>
                    <input type="text" id="weightKg" th:field="*{weightKg}" placeholder="1.250"
                           th:classappend="${errors.field('weightKg')} ? 'ring-red-400 focus:ring-red-500' : 'ring-slate-300 focus:ring-indigo-500'"
                           class="mt-1 block w-full rounded-md border-0 px-3 py-2 text-slate-900 ring-1 ring-inset focus:ring-2 focus:ring-inset sm:text-sm"/>
                    <p th:if="${errors.field('weightKg')}" th:text="${errors.field('weightKg')}"
                       class="mt-1 text-sm text-red-600">Weight error</p>
                </div>
            </div>

            <div class="flex items-center justify-end gap-3 border-t border-slate-200 pt-6">
                <a href="/products"
                   class="rounded-md px-4 py-2 text-sm font-medium text-slate-600 hover:text-slate-900">Cancel</a>
                <button type="submit"
                        class="rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                    Create product
                </button>
            </div>
        </form>
    </div>
</section>

</body>
</html>

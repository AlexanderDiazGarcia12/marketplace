spring:
  application:
    name: marketplace
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

marketplace:
  outbox:
    relay:
      fixed-delay-ms: 1000
